<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Agent Relay icon variation 4</title>
  <desc id="desc">A more abstract modular mask icon with a single lower shell and clean signal cut.</desc>
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#121212"/>
  <g stroke="#FFB000" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <rect x="15" y="12" width="11" height="14" rx="3.5"/>
    <rect x="38" y="12" width="11" height="14" rx="3.5"/>
    <path d="M18 40h23a4 4 0 0 1 4 4v6H18z" stroke="#B87A00" stroke-width="3.2"/>
    <path d="M48.5 40v10"/>
  </g>
  <g fill="#7EE34B" filter="url(#softGlow)">
    <rect x="24" y="43" width="4.5" height="4.5" rx="0.8"/>
    <rect x="33.5" y="43" width="4.5" height="4.5" rx="0.8"/>
  </g>
</svg>
