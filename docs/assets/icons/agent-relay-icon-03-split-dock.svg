<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Agent Relay icon variation 3</title>
  <desc id="desc">An agent icon with a split lower dock that implies relay and modular handoff.</desc>
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#121212"/>
  <g stroke="#FFB000" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <rect x="14" y="11" width="12" height="16" rx="3.5"/>
    <rect x="38" y="11" width="12" height="16" rx="3.5"/>
    <path d="M16 39h11v10H16z" stroke="#B87A00" stroke-width="3.1"/>
    <path d="M31 39h11v10H31z" stroke="#B87A00" stroke-width="3.1"/>
    <path d="M27 44h4"/>
    <path d="M46 44h5"/>
  </g>
  <g fill="#7EE34B" filter="url(#softGlow)">
    <rect x="20" y="42" width="4" height="4" rx="0.8"/>
    <rect x="35" y="42" width="4" height="4" rx="0.8"/>
  </g>
</svg>
