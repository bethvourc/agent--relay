<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Agent Relay final icon</title>
  <desc id="desc">A refined Agent Relay mark with two upper eye modules, a lower terminal dock, and a detached relay signal bar.</desc>
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#121212"/>
  <g filter="url(#softGlow)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="15" y="11.5" width="11.5" height="15" rx="3.3" stroke="#FFB000" stroke-width="2.6"/>
    <rect x="37.5" y="11.5" width="11.5" height="15" rx="3.3" stroke="#FFB000" stroke-width="2.6"/>
    <rect x="17" y="37" width="27" height="13.5" rx="1.6" stroke="#B87A00" stroke-width="3.4"/>
    <path d="M49.5 39.5v8.5" stroke="#FFB000" stroke-width="2.3"/>
  </g>
  <g fill="#7EE34B" filter="url(#softGlow)">
    <rect x="24" y="41.5" width="4.4" height="4.4" rx="0.8"/>
    <rect x="33.6" y="41.5" width="4.4" height="4.4" rx="0.8"/>
  </g>
</svg>
