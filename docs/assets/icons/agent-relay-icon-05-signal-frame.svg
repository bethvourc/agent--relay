<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Agent Relay icon variation 5</title>
  <desc id="desc">A cleaner, more symbolic frame with terminal eyes and a subtle outgoing relay stroke.</desc>
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
