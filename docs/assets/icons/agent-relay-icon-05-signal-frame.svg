        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#121212"/>
  <g stroke="#FFB000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <rect x="15" y="12" width="10" height="14" rx="3"/>
    <rect x="39" y="12" width="10" height="14" rx="3"/>
    <path d="M17 40h28" stroke="#B87A00" stroke-width="3.4"/>
    <path d="M17 48h24" stroke="#B87A00" stroke-width="3.4"/>
    <path d="M17 40v8"/>
    <path d="M41 40v8"/>
    <path d="M48 42.5v7"/>
  </g>
  <g fill="#7EE34B" filter="url(#softGlow)">
